<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Updated - ScrapyX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#00d4c5',
                            hover: '#00b8aa',
                        },
                        dark: {
                            bg: '#0a0f1c',
                            form: '#0f172a',
                            input: '#1e293b',
                            border: '#334155',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-dark-bg text-gray-300 px-4">
    <div class="w-full max-w-md glass-card rounded-2xl p-8 border border-white/10 bg-black/40 text-center">
        <h2 class="text-3xl font-bold text-white mb-3">Password Updated</h2>
        <p class="text-gray-400 text-sm">Your password has been reset successfully.</p>
        <a href="{% url 'login' %}" class="inline-block mt-8 text-brand hover:underline font-medium">Go to Log in</a>
    </div>
</body>
</html>
