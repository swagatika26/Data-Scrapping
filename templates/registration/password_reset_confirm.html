<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - OneClick DataScrape</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#00d4c5',
                            hover: '#00b8aa',
                        },
                        dark: {
                            bg: '#0a0f1c',
                            form: '#0f172a',
                            input: '#1e293b',
                            border: '#334155',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-dark-bg text-gray-300 px-4">
    <div class="w-full max-w-md glass-card rounded-2xl p-8 border border-white/10 bg-black/40">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Set New Password</h2>
            <p class="text-gray-400 text-sm">Choose a strong password for your account.</p>
        </div>

        {% if validlink %}
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="id_new_password1" class="block text-xs font-semibold text-gray-500 uppercase mb-2">New Password</label>
                <input type="password" name="new_password1" id="id_new_password1"
                    class="w-full bg-dark-input border border-dark-border text-white rounded-lg px-4 py-3 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600"
                    required>
            </div>
            <div>
                <label for="id_new_password2" class="block text-xs font-semibold text-gray-500 uppercase mb-2">Confirm Password</label>
                <input type="password" name="new_password2" id="id_new_password2"
                    class="w-full bg-dark-input border border-dark-border text-white rounded-lg px-4 py-3 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600"
                    required>
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-dark-bg font-bold py-3 px-4 rounded-lg transition-all shadow-[0_0_20px_rgba(0,212,197,0.2)]">
                Update Password
            </button>
        </form>
        {% else %}
        <div class="text-center">
            <p class="text-sm text-gray-400">This reset link is invalid or has expired.</p>
            <a href="{% url 'password_reset' %}" class="inline-block mt-6 text-brand hover:underline font-medium">Request a new link</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
