<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ScrapyX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#00d4c5',
                            hover: '#00b8aa',
                        },
                        dark: {
                            bg: '#0a0f1c',
                            form: '#0f172a',
                            input: '#1e293b',
                            border: '#334155',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-dark-bg text-gray-300 px-4">
    <div class="w-full max-w-md glass-card rounded-2xl p-8 border border-white/10 bg-black/40">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Reset Password</h2>
            <p class="text-gray-400 text-sm">Enter your email and we’ll send a reset link.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-xs font-semibold text-gray-500 uppercase mb-2">Email Address</label>
                <input type="email" name="email" id="id_email" placeholder="you@company.com"
                    class="w-full bg-dark-input border border-dark-border text-white rounded-lg px-4 py-3 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600"
                    required>
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-dark-bg font-bold py-3 px-4 rounded-lg transition-all shadow-[0_0_20px_rgba(0,212,197,0.2)]">
                Send Reset Link
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8">
            Back to <a href="{% url 'login' %}" class="text-brand hover:underline font-medium">Log in</a>
        </p>
    </div>
</body>
</html>
